<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - Grammaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-blue-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-500 to-blue-900 rounded-full text-white text-3xl font-bold mb-4">
                G
            </div>
            <h1 class="text-2xl font-bold text-blue-900">Grammaire</h1>
            <p class="text-gray-600 mt-2">Finalisez votre paiement</p>
        </div>

        <!-- Messages d'erreur/succès -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-300{% else %}bg-green-100 text-green-700 border border-green-300{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Formulaire de paiement -->
        <form method="post" action="{% url 'initier_paiement' offre.id %}" class="space-y-6">
            {% csrf_token %}

            <!-- Montant -->
            <div class="bg-amber-50 rounded-lg p-4 text-center">
                <p class="text-sm text-gray-600">Montant à payer</p>
                <p class="text-3xl font-bold text-amber-600">{{ offre.prix }} FCFA</p>
            </div>

            <!-- Sélection de l'opérateur -->
            <div>
                <label for="provider" class="block text-sm font-medium text-gray-700 mb-2">
                    Opérateur Mobile Money
                </label>
                <select
                    id="provider"
                    name="provider"
                    required
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-amber-500 focus:ring-2 focus:ring-amber-200 transition-all outline-none"
                >
                    <option value="">Sélectionnez un opérateur</option>
                    <option value="MTN" {% if provider == 'MTN' %}selected{% endif %}>MTN Mobile Money</option>
                    <option value="AIRTEL" {% if provider == 'AIRTEL' %}selected{% endif %}>Airtel Money</option>
                    <option value="MOOV" {% if provider == 'MOOV' %}selected{% endif %}>Moov Money</option>
                </select>
            </div>

            <!-- Numéro de téléphone -->
            <div>
                <label for="telephone" class="block text-sm font-medium text-gray-700 mb-2">
                    Numéro de téléphone
                </label>
                <div class="relative">
                    <input
                        type="tel"
                        id="telephone"
                        name="telephone"
                        placeholder="242068736846"
                        value="{{ telephone|default:'' }}"
                        required
                        pattern="[0-9]{9,15}"
                        title="Numéro à 12 chiffres (ex: 242068736846)"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-amber-500 focus:ring-2 focus:ring-amber-200 transition-all outline-none pl-12"
                    >
                    <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-1">Format : 242068736846 (12 chiffres)</p>
            </div>

            <!-- Bouton de paiement -->
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-amber-500 to-amber-600 text-white font-semibold py-4 rounded-lg hover:from-amber-600 hover:to-amber-700 transform hover:scale-[1.02] transition-all duration-200 shadow-lg"
            >
                Payer maintenant
            </button>

            <!-- Informations de sécurité -->
            <div class="flex items-center justify-center space-x-2 text-xs text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span>Paiement sécurisé par Mobile Money</span>
            </div>
        </form>

        <!-- Lien retour -->
        <div class="mt-6 text-center">
            <a href="{% url 'dashboard' %}" class="text-sm text-blue-900 hover:text-amber-600 transition-colors">
                ← Retour au dashboard
            </a>
        </div>
    </div>
</body>
</html>
