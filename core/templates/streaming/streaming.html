<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ video.titre }} | StreamFlex</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --accent-color: #10b981;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Roboto", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .main-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .back-nav {
            margin-bottom: 15px;
        }

        .back-nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* --- LECTEUR VIDÉO (Ajustement) --- */
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* --- INFOS VIDÉO & ACTIONS --- */
        .video-header {
            margin-top: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin: 0 0 10px 0; }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-stats { color: var(--text-dim); font-size: 0.9rem; }

        .interactions { display: flex; gap: 15px; }

        .btn-action {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-action:hover { background: #333; }

        /* --- ZONE DESCRIPTION --- */
        .description-box {
            background: var(--surface-color);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- SECTION COMMENTAIRES --- */
        .comments-section {
            margin-top: 40px;
        }

        .comment-count { font-size: 1.2rem; margin-bottom: 20px; }

        .comment-form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .comment-input-box { flex: 1; }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: white;
            padding: 8px 0;
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus { border-bottom: 2px solid var(--accent-color); }

        .comment-list { list-style: none; padding: 0; }

        .comment-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .comment-text { font-size: 0.9rem; }
        .comment-author { font-weight: bold; margin-bottom: 4px; display: block; font-size: 0.85rem; }

    </style>
</head>
<body>

    <div class="main-layout">
        <div class="back-nav">
            <a href="{% url 'video' %}">← Retour au catalogue</a>
        </div>

        <div class="video-container">
            <video id="mainVideo" controls autoplay poster="{{ video.miniature.url }}">
                <source src="{{ videos.fichier_video.url }}" type="video/mp4">
            </video>
        </div>

        <div class="video-header">
            <h1>{{ videos.titre }}</h1>
            <div class="action-bar">
                <div class="video-stats">Publié le {{ videos.date_publication|date:"d M Y" }}</div>
                <div class="interactions">
                    <button class="btn-action" onclick="handleLike()">👍 <span id="likeCount">12</span></button>
                    <button class="btn-action">💾 Enregistrer</button>
                    <button class="btn-action">🔗 Partager</button>
                </div>
            </div>
        </div>

        <div class="description-box">
            {{ videos.description|linebreaks }}
        </div>

        <section class="comments-section">
            <div class="comment-count">3 Commentaires</div>
            
            <form method="post">
                {% csrf_token %}
                <div class="comment-form">
                    <div class="user-avatar">M</div>
                    <div class="comment-input-box" >
                        <input type="text" placeholder="Ajouter un commentaire..." name="contenu">
                    </div>
                    <button type="submit" class="btn-action" style="border-radius: 20px; padding: 8px 20px;">
                        Envoyer
                    </button>
                </div>
            </form>
            {% for commentaire in commentaires %}
            <div class="comment-list">
                <div class="comment-item">
                    <div class="user-avatar" style="background: #e11d48;">A</div>
                    <div class="comment-content">
                        <span class="comment-author">{{commentaire.user.username}}</span>
                        <p class="comment-text">{{commentaire.contenu}}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </section>
    </div>

    <script>
        // Simulation simple pour les likes
        let likes = 12;
        function handleLike() {
            likes++;
            document.getElementById('likeCount').innerText = likes;
        }
    </script>

</body>
</html>
