<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue des Cours</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #ffffff; --free: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .slider-container { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .video-card { flex: 0 0 300px; background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; position: relative; }
        .available:hover { transform: scale(1.03); border: 1px solid var(--free); }
        .locked { opacity: 0.7; cursor: not-allowed; }
        .thumb-wrapper { height: 170px; position: relative; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .locked img { filter: blur(4px) grayscale(1); }
        .lock-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); font-weight: bold; }
        .card-content { padding: 15px; }
        .video-link { text-decoration: none; color: inherit; }
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .bg-free { background: var(--free); }
        .bg-red { background: var(--red); }
    </style>
</head>
<body>
    <h2>Mes Cours Vidéo</h2>
    <div class="slider-container">
        {% for video in videos %}
            {% if video.is_free %}
            <a href="{% url 'streaming' video.id %}" class="video-link">
                <div class="video-card available">
                    <div class="thumb-wrapper">
                        <img src="{{ video.miniature.url }}" alt="">
                    </div>
                    <div class="card-content">
                        <span class="badge bg-free">Disponible</span>
                        <h3>{{ video.titre }}</h3>
                        <p>{{ video.description|truncatechars:60 }}</p>
                    </div>
                </div>
            </a>
            {% else %}
            <div class="video-card locked">
                <div class="thumb-wrapper">
                    <img src="{{ video.miniature.url }}" alt="">
                    <div class="lock-overlay">🔒 PREMIUM</div>
                </div>
                <div class="card-content">
                    <span class="badge bg-red">Indisponible</span>
                    <h3>{{ video.titre }}</h3>
                </div>
            </div>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
